<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Todo</title><script defer="defer" src="app.bundle.js"></script></head><body><div class="container"><aside class="aside"><button type="button" class="new-list-btn">Create list &plus;</button><h2>Lists</h2><div class="lists-div"></div></aside><div class="main-content"><button type="button" class="new-todo-btn" disabled="disabled">New todo</button><main class="content"></main></div></div><div class="hiddenItems"><dialog class="new-list-dialog"><form action="" class="new-list-form"><button type="button" class="cancel-btn">&times;</button><h2>Let's label your list</h2><div><label for="list-label">Label</label><br><input name="list-label" id="list-label"></div><div class="form-footer"><input type="submit" value="Add list" class="add-list"> <button type="button" class="cancel-btn">Cancel</button></div></form></dialog><dialog class="new-todo-dialog"><form action="" class="new-todo-form"><button type="button" class="cancel-btn">&times;</button><h2>What do you plan to do?</h2><div><label for="title-input">Title</label><br><input name="title-input" id="title-input"></div><div><label for="description-input">Description</label><br><textarea name="description-input" id="description-input"></textarea></div><div><label for="start-date-input">Start date</label><br><input type="date" name="start-date-input" id="start-date-input"></div><div><label for="priority-select">Priority</label><br><select name="priority-select" id="priority-select"><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select></div><input type="submit" value="Add Todo" class="add-todo"></form></dialog><dialog class="edit-todo-dialog"><form action="" method="dialog" class="edit-todo-form"><input type="hidden" name="category" , id="category"> <button type="button" class="cancel-btn">&times;</button><h2>edit todo</h2><div><label for="title-edit">Title</label><br><input name="title-edit" id="title-edit"></div><div><label for="description-edit">Description</label><br><textarea name="description-edit" id="description-edit"></textarea></div><div><label for="start-date-edit">Start date</label><br><input type="date" name="start-date-edit" id="start-date-edit"></div><div><label for="priority-edit">Priority</label><br><select name="priority-edit" id="priority-edit"><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select></div><input type="submit" value="Update Todo" class="update-todo"></form></dialog><template class="todo-template"><div class="todo"><div class="summary"><input type="checkbox" name="status-box" class="status-box"><h3 class="title">Hey</h3><button type="button" class="delete-btn">Delete</button> <button type="button" class="edit-btn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-edit-2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button></div><div class="description">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Necessitatibus eos quia placeat nulla veniam in nam deserunt fugiat. Iure quis sed optio quasi! Pariatur sapiente eum at non, error amet.</div><div class="todo-footer"><span class="start-date">Date</span> <span class="priority">High</span></div></div></template></div></body></html>
